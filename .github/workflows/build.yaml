name: Build & Push

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".github/workflows/build.yml"
  workflow_dispatch:
    inputs:
      n8n_version:
        description: "Base n8n image tag (also used as version tag)"
        required: false
        default: "2.25.3"

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/timonaldenhoff/n8n
  STABLE_TAG: stable

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version + second tag
        run: |
          # Version used for Dockerfile ARG
          if [ -n "${{ github.event.inputs.n8n_version }}" ]; then
            echo "N8N_VERSION=${{ github.event.inputs.n8n_version }}" >> $GITHUB_ENV
            echo "TAG2=${{ github.event.inputs.n8n_version }}" >> $GITHUB_ENV
          else
            echo "N8N_VERSION=2.15.0" >> $GITHUB_ENV
            echo "TAG2=latest" >> $GITHUB_ENV
          fi

          echo "Building N8N_VERSION=$N8N_VERSION"
          echo "Pushing tags: ${STABLE_TAG} and ${TAG2}"

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            N8N_VERSION=${{ env.N8N_VERSION }}
          tags: |
            ${{ env.IMAGE }}:${{ env.STABLE_TAG }}
            ${{ env.IMAGE }}:${{ env.TAG2 }}
